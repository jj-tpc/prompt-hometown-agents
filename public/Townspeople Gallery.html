<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Townspeople — 7 character sheets</title>
<style>
  :root {
    --bg: #c0d470;
    --bg-deep: #78a158;
    --panel: #f3e5c2;
    --panel-edge: #b68962;
    --ink-dark: #5c4e92;
    --ink: #6b4b5b;
    --ink-light: #90625d;
    --accent: #aa7959;
    --grass: #a4c263;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--ink); font-family: 'Quicksand', 'Trebuchet MS', system-ui, sans-serif; font-size: 16px; line-height: 1.5; }
  img, canvas { image-rendering: pixelated; image-rendering: crisp-edges; display: block; }
  .stage { max-width: 1200px; margin: 0 auto; padding: 32px 24px 80px; }

  .doc-eyebrow { color: var(--ink-light); font-size: 13px; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 700; }
  .doc-title { font-size: 48px; font-weight: 800; color: var(--ink-dark); margin: 4px 0 8px; letter-spacing: -0.02em; }
  .doc-sub { font-size: 17px; color: var(--ink); max-width: 760px; margin-bottom: 32px; }

  .links { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 32px; }
  .links a {
    background: var(--panel); border: 2px solid var(--ink-light);
    padding: 4px 12px; border-radius: 12px; font-weight: 600;
    color: var(--ink-dark); text-decoration: none; font-size: 13px;
    box-shadow: 0 2px 0 var(--ink-light);
  }
  .links a:hover { background: white; }

  /* Roster grid: one card per character */
  .roster { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 48px; }

  .char-card {
    background: var(--panel);
    border: 3px solid var(--ink-light);
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 4px 0 var(--ink-light);
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 24px;
    align-items: start;
  }

  .char-id { padding-top: 4px; }
  .char-name {
    font-size: 24px; font-weight: 800; color: var(--ink-dark);
    margin-bottom: 2px; letter-spacing: -0.01em;
  }
  .char-kr { font-size: 13px; color: var(--ink-light); margin-bottom: 8px; font-weight: 600; }
  .char-desc { font-size: 13px; color: var(--ink); margin-bottom: 12px; line-height: 1.5; }
  .pal-row { display: flex; gap: 4px; margin-bottom: 4px; }
  .pal-row .sw {
    width: 22px; height: 22px;
    border: 2px solid rgba(0,0,0,0.2);
    border-radius: 3px;
    position: relative;
  }
  .pal-row .label { font-size: 10px; color: var(--ink-light); margin-left: 8px; align-self: center; }

  .file-chip {
    display: inline-block; margin-top: 12px;
    background: white; border: 2px solid var(--ink-light);
    padding: 2px 10px; border-radius: 12px;
    font-family: 'Roboto Mono', monospace; font-size: 11px;
    color: var(--ink-dark); font-weight: 600;
  }

  /* Animation displays */
  .anim-area {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
  }
  .anim-cell {
    background: var(--grass);
    border: 2px solid var(--ink-light);
    border-radius: 6px;
    display: flex; flex-direction: column; align-items: center;
    padding: 12px 8px 8px;
  }
  .anim-canvas { width: 96px; height: 96px; }
  .anim-label { font-size: 10px; color: var(--ink-light); margin-top: 6px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }

  /* Sheet display row */
  .sheet-row {
    margin-top: 12px;
    background: var(--grass);
    border: 2px solid var(--ink-light);
    border-radius: 6px;
    padding: 12px;
    overflow-x: auto;
  }
  .sheet-row img { width: 384px; height: 384px; }

  /* Frames strip */
  .frames-strip {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px;
    background: var(--grass);
    border: 2px solid var(--ink-light);
    border-radius: 6px;
    padding: 8px;
  }
  .frame-square {
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    width: 64px; height: 64px;
    display: flex; align-items: center; justify-content: center;
  }
  .frame-num {
    font-size: 9px; font-family: monospace; color: var(--ink-light);
    margin-top: 2px;
  }

  .speed-tag {
    display: inline-flex; align-items: center; gap: 6px;
    background: white; padding: 2px 8px; border-radius: 8px;
    border: 2px solid var(--ink-light);
    font-size: 11px; color: var(--ink-dark); font-weight: 600;
  }

  /* Hero comparison */
  .hero-compare {
    background: var(--panel);
    border: 3px solid var(--ink-light);
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 4px 0 var(--ink-light);
    margin-bottom: 32px;
  }
  .hero-compare-title { font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 700; color: var(--ink-light); margin-bottom: 12px; }
  .hero-compare-canvas {
    background: var(--grass);
    border: 2px solid var(--ink-light);
    border-radius: 6px;
    padding: 24px;
    display: flex; gap: 12px; justify-content: center;
  }

  .ctrl {
    background: var(--panel); border: 2px solid var(--ink-light);
    border-radius: 6px; padding: 6px 12px;
    font-weight: 700; font-size: 12px; color: var(--ink-dark);
    cursor: pointer; user-select: none;
    box-shadow: 0 2px 0 var(--ink-light);
  }
  .ctrl.active { background: var(--ink-dark); color: white; border-color: var(--ink-dark); }

  .meta-grid {
    margin-top: 24px;
    background: var(--panel); border: 3px solid var(--ink-light);
    border-radius: 12px; padding: 20px;
    box-shadow: 0 3px 0 var(--ink-light);
  }
  .meta-grid h3 { font-size: 16px; color: var(--ink-dark); margin-bottom: 8px; }
  .meta-grid p { font-size: 13px; color: var(--ink); margin-bottom: 6px; }
  .meta-grid code { background: white; padding: 1px 6px; border-radius: 3px; font-family: monospace; font-size: 12px; color: var(--ink-dark); }
</style>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

</html>
